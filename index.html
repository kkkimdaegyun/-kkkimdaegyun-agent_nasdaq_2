<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Macro & Liquidity Dashboard</title>
    <style>
        /* --- CSS 디자인 (깔끔한 다크테마) --- */
        body, html {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #131722; color: #d1d4dc; display: flex;
        }
        .sidebar {
            width: 280px; background-color: #1e222d; border-right: 1px solid #2a2e39;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10;
        }
        .sidebar h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #ffffff; }
        .sidebar-subtitle { font-size: 0.8rem; color: #787b86; margin-bottom: 20px; border-bottom: 1px solid #2a2e39; padding-bottom: 10px; }
        .menu-group { margin-bottom: 25px; }
        .menu-group-title { font-size: 0.75rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-left: 5px; }
        .menu-item {
            padding: 12px 15px; background-color: transparent; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease; font-weight: 500; font-size: 0.95rem; color: #b2b5be; margin-bottom: 2px;
        }
        .menu-item:hover { background-color: #2a2e39; color: #ffffff; }
        .menu-item.active { background-color: #2962ff; color: #ffffff; }
        
        .macro-status-panel {
            margin-top: auto; background-color: #131722; border-radius: 10px;
            padding: 15px; border: 1px solid #2a2e39;
        }
        .macro-status-title { font-size: 0.85rem; color: #ffffff; font-weight: 700; margin-bottom: 10px; }
        .status-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        .status-label { color: #787b86; }
        .status-value { font-weight: 700; font-family: monospace; font-size: 1rem; }
        
        .main-content { flex: 1; height: 100vh; position: relative; }
        .tradingview-widget-container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛡️ Macro Dashboard</h2>
        <div class="sidebar-subtitle">글로벌 자산 및 유동성 실시간 추적</div>

        <div class="menu-group">
            <div class="menu-group-title">Markets</div>
            <div class="menu-item active" onclick="changeChart('OANDA:NAS100USD', this)">📈 나스닥 (CFD)</div>
            <div class="menu-item" onclick="changeChart('BINANCE:BTCUSD', this)">🪙 비트코인</div>
            <div class="menu-item" onclick="changeChart('TVC:DXY', this)">🦅 달러 인덱스</div>
            <div class="menu-item" onclick="changeChart('TVC:USOIL', this)">🛢️ WTI 원유 선물</div>
            <div class="menu-item" onclick="changeChart('FX_IDC:USDKRW', this)">💵 달러/원 환율</div>
        </div>

        <div class="menu-group">
            <div class="menu-group-title">Fed & Treasury</div>
            <div class="menu-item" onclick="changeChart('FRED:WTREGEN', this)">🏦 TGA (재무부 잔고)</div>
            <div class="menu-item" onclick="changeChart('FRED:RRPONTSYD', this)">🔄 RRP (역레포 잔고)</div>
        </div>

        <div class="macro-status-panel">
            <div class="macro-status-title">📊 실시간 매크로 지표</div>
            <div class="status-item">
                <span class="status-label">트루인플레이션</span>
                <span class="status-value" id="truflation-val" style="color: #787b86;">Loading..</span>
            </div>
            <div class="status-item">
                <span class="status-label">QRA (자금조달)</span>
                <span class="status-value" id="qra-status" style="color: #787b86;">Checking..</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="tv_chart_container" class="tradingview-widget-container"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        // 1. 차트 생성기
        function createWidget(symbol) {
            document.getElementById('tv_chart_container').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "15",
                "timezone": "Asia/Seoul",
                "theme": "dark",
                "style": "1",
                "locale": "kr",
                "enable_publishing": false,
                "backgroundColor": "#131722",
                "gridColor": "#2a2e39",
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tv_chart_container"
            });
        }

        // 2. 메뉴 클릭 시 차트 스위칭
        function changeChart(symbol, element) {
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            createWidget(symbol);
        }

        // 3. 트루인플레이션 실시간 Fetch (API 호출 - CORS 보안 에러 우회 적용)
        async function fetchTruflation() {
            const truflationEl = document.getElementById('truflation-val');
            try {
                // 브라우저 보안 정책(CORS)에 막히지 않도록 프록시 터널을 경유합니다.
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const targetUrl = 'https://api.truflation.com/current/us/yoy';
                
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.text();
                const inflationRate = parseFloat(data).toFixed(2);
                
                truflationEl.innerText = inflationRate + '%';
                truflationEl.style.color = '#ff9800'; // 주황색
            } catch (error) {
                console.error('Truflation fetch error:', error);
                truflationEl.innerText = 'API 지연';
                truflationEl.style.color = '#f44336';
            }
        }

        // 4. QRA 일정 계산기
        function calculateQRAStatus() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const qraEl = document.getElementById('qra-status');

            if ([1, 4, 7, 10].includes(month)) {
                if (date >= 25) {
                    qraEl.innerText = "⚠️ 발표 임박";
                    qraEl.style.color = "#f44336"; // 빨강
                } else {
                    qraEl.innerText = `⏳ ${month}월 말 발표`;
                    qraEl.style.color = "#ffeb3b"; // 노랑
                }
            } else {
                qraEl.innerText = "✅ 평시 (안정)";
                qraEl.style.color = "#4caf50"; // 초록
            }
        }

        // 5. 페이지 로드 시 즉시 실행 및 자동 새로고침(setInterval) 세팅
        window.onload = function() {
            // 초기 렌더링 시 변경된 나스닥 심볼을 띄워줍니다.
            createWidget('OANDA:NAS100USD'); 
            
            // 데이터 즉시 불러오기
            fetchTruflation();
            calculateQRAStatus();

            // 백그라운드 실시간 업데이트 세팅 (새로고침 안 해도 알아서 숫자 바뀜)
            setInterval(fetchTruflation, 600000); // 10분마다
            setInterval(calculateQRAStatus, 3600000); // 1시간마다
        };
    </script>
</body>
</html>
