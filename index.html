<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Macro & Liquidity Dashboard</title>
    <style>
        /* --- 1. CSS 리셋 및 전체 화면 고정 (차트 잘림 방지 핵심) --- */
        html, body {
            margin: 0; padding: 0;
            height: 100% !important; /* 무조건 높이 100% 차지 */
            width: 100% !important;
            overflow: hidden; /* 페이지 자체 스크롤 방지 */
            background-color: #131722;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #d1d4dc;
            display: flex; /* 사이드바와 메인 화면 가로 배치 */
        }

        /* --- 2. 왼쪽 사이드바 디자인 --- */
        .sidebar {
            width: 280px;
            min-width: 280px; /* 너비 고정 */
            background-color: #1e222d;
            border-right: 1px solid #2a2e39;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            height: 100%; /* 부모(body) 높이 가득 채움 */
            z-index: 10;
        }

        .sidebar h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #ffffff; }
        .sidebar-subtitle { font-size: 0.8rem; color: #787b86; margin-bottom: 20px; border-bottom: 1px solid #2a2e39; padding-bottom: 10px; }
        
        .menu-group { margin-bottom: 25px; }
        .menu-group-title { font-size: 0.75rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; padding-left: 5px; }
        
        .menu-item {
            padding: 12px 15px; background-color: transparent; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease; font-weight: 500; font-size: 0.95rem; color: #b2b5be; margin-bottom: 2px;
            display: flex; align-items: center; gap: 10px;
        }
        .menu-item:hover { background-color: #2a2e39; color: #ffffff; }
        .menu-item.active { background-color: #2962ff !important; color: #ffffff !important; }
        
        /* 하단 매크로 상태판 */
        .macro-status-panel {
            margin-top: auto; background-color: #131722; border-radius: 10px;
            padding: 15px; border: 1px solid #2a2e39;
        }
        .macro-status-title { font-size: 0.85rem; color: #ffffff; font-weight: 700; margin-bottom: 10px; }
        .status-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        .status-label { color: #787b86; }
        .status-value { font-weight: 700; font-family: monospace; font-size: 1rem; }
        
        /* --- 3. 오른쪽 메인 차트 화면 (꽉 차게 설정) --- */
        .main-content {
            flex: 1; /* 남은 가로 공간 100% 차지 */
            height: 100% !important; /* 부모(body) 높이 가득 채움 */
            position: relative;
            background-color: #131722; /* 기본 배경색 */
        }

        /* 트레이딩뷰 & FRED 컨테이너 (부모 안에 꽉 차게) */
        .chart-container {
            width: 100%;
            height: 100% !important;
            border: none;
            display: block;
        }

    </style>
</head>
<body>

    <div class="sidebar">
        <h2>🛡️ Macro Dashboard</h2>
        <div class="sidebar-subtitle">글로벌 자산 및 유동성 실시간 추적</div>

        <div class="menu-group">
            <div class="menu-group-title">Markets</div>
            <div class="menu-item active" onclick="changeChart('OANDA:NAS100USD', this, '15', 'TV')">📈 나스닥 (CFD)</div>
            <div class="menu-item" onclick="changeChart('BINANCE:BTCUSD', this, '15', 'TV')">🪙 비트코인</div>
            <div class="menu-item" onclick="changeChart('TVC:DXY', this, '15', 'TV')">🦅 달러 인덱스</div>
            <div class="menu-item" onclick="changeChart('TVC:USOIL', this, '15', 'TV')">🛢️ WTI 원유 선물</div>
            <div class="menu-item" onclick="changeChart('FX_IDC:USDKRW', this, '15', 'TV')">💵 달러/원 환율</div>
        </div>

        <div class="menu-group">
            <div class="menu-group-title">Fed & Treasury</div>
            <div class="menu-item" onclick="changeChart('WTREGEN', this, 'D', 'FRED')">🏦 TGA (재무부 잔고)</div>
            <div class="menu-item" onclick="changeChart('RRPONTSYD', this, 'D', 'FRED')">🔄 RRP (역레포 잔고)</div>
        </div>

        <div class="macro-status-panel">
            <div class="macro-status-title">📊 실시간 매크로 지표</div>
            <div class="status-item">
                <span class="status-label">트루인플레이션</span>
                <span class="status-value" id="truflation-val" style="color: #787b86;">Loading..</span>
            </div>
            <div class="status-item">
                <span class="status-label">QRA (자금조달)</span>
                <span class="status-value" id="qra-status" style="color: #787b86;">Checking..</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="chart_holder" style="width:100%; height:100%;"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        
        // --- [핵심] 차트 메뉴 클릭 이벤트 (타입 변수 추가) ---
        function changeChart(symbol, element, interval, type) {
            // 1. 모든 메뉴의 active 클래스 제거
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            // 2. 클릭한 메뉴에 active 클래스 추가 (색상 변경)
            element.classList.add('active');
            
            // 3. 차트 홀더 초기화 (기존 차트 삭제)
            document.getElementById('chart_holder').innerHTML = '';

            // 4. 타입에 따라 다른 차트 생성
            if(type === 'TV') {
                createTradingViewWidget(symbol, interval);
            } else if(type === 'FRED') {
                createFredWidget(symbol);
            }
        }

        // --- 1. 트레이딩뷰 차트 생성기 (Dark 테마) ---
        function createTradingViewWidget(symbol, interval) {
            const container = document.createElement('div');
            container.id = 'tv_widget_container';
            container.className = 'chart-container';
            document.getElementById('chart_holder').appendChild(container);

            new TradingView.widget({
                "autosize": true, // 부모 컨테이너 크기에 100% 맞춤
                "symbol": symbol,
                "interval": interval,
                "timezone": "Asia/Seoul",
                "theme": "dark", // 다크 테마
                "style": "1", // 캔들 차트
                "locale": "kr", // 한국어
                "backgroundColor": "#131722",
                "gridColor": "#2a2e39",
                "container_id": "tv_widget_container"
            });
        }

        // --- 2. [신규] FRED 공식 차트 생성기 (Iframe 방식) ---
        function createFredWidget(symbol) {
            // FRED 공식 임베드 URL (Daily로 설정)
            // FRED 사이트 디자인 그대로 가져옵니다.
            const fredUrl = `https://fred.stlouisfed.org/graph/embed.html?fq=Daily&id=${symbol}&mode=fred&type=line`;
            
            const iframe = document.createElement('iframe');
            iframe.src = fredUrl;
            iframe.className = 'chart-container'; // CSS 클래스 적용
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('scrolling', 'no'); // 내부 스크롤 방지
            
            document.getElementById('chart_holder').appendChild(iframe);
        }

        // --- 3. 트루인플레이션 실시간 Fetch ---
        async function fetchTruflation() {
            const truflationEl = document.getElementById('truflation-val');
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = encodeURIComponent('https://api.truflation.com/current/us/yoy');
                
                const response = await fetch(proxyUrl + targetUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json(); 
                const inflationRate = parseFloat(data.contents).toFixed(2);
                
                if(isNaN(inflationRate)) throw new Error('NaN returned');

                truflationEl.innerText = inflationRate + '%';
                truflationEl.style.color = '#ff9800'; 
            } catch (error) {
                console.error('Truflation fetch error:', error);
                truflationEl.innerText = 'API 지연';
                truflationEl.style.color = '#f44336';
            }
        }

        // --- 4. QRA 일정 계산기 ---
        function calculateQRAStatus() {
            const today = new Date();
            const month = today.getMonth() + 1;
            const date = today.getDate();
            const qraEl = document.getElementById('qra-status');

            if ([1, 4, 7, 10].includes(month)) {
                if (date >= 25) {
                    qraEl.innerText = "⚠️ 발표 임박";
                    qraEl.style.color = "#f44336"; 
                } else {
                    qraEl.innerText = `⏳ ${month}월 말 발표`;
                    qraEl.style.color = "#ffeb3b"; 
                }
            } else {
                qraEl.innerText = "✅ 평시 (안정)";
                qraEl.style.color = "#4caf50"; 
            }
        }

        // --- 5. 페이지 로드 시 즉시 실행 ---
        window.onload = function() {
            // 초기 렌더링 시 나스닥 트레이딩뷰 차트로 시작
            createTradingViewWidget('OANDA:NAS100USD', '15'); 
            
            fetchTruflation();
            calculateQRAStatus();

            setInterval(fetchTruflation, 600000); 
            setInterval(calculateQRAStatus, 3600000); 
        };
    </script>
</body>
</html>
